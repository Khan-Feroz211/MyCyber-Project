name: MyCyber DLP Platform CI/CD

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mycyber

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.4.7 black==24.4.2
      - run: ruff check services/ ml-pipeline/
      - run: black --check services/ ml-pipeline/

  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest ≥80% coverage)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov pytest-asyncio httpx fastapi pydantic pyyaml structlog prometheus-client
      - run: pytest tests/ --cov=services --cov=ml-pipeline --cov-fail-under=80 -v

  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security (bandit + trivy)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit==1.7.9
      - run: bandit -r services/ ml-pipeline/ -ll -x tests/
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore
          skip-files: "databases/text/production_dump.sql,create_dlp_databases.py,scanner_engine.py,DLP_SYSTEM_COMPLETE_GUIDE.docx.txt"

  # ────────────────────────────────────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Check (PR validation)
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        service: [ingestion, ml-inference, policy-engine, alert, dashboard-api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: mycyber-${{ matrix.service }}:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ingestion, ml-inference, policy-engine, alert, dashboard-api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        run: |
          sed -i "s/:latest/:${{ github.sha }}/g" infra/k8s/deployments.yaml
      - name: Deploy to staging namespace
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            infra/k8s/namespace.yaml
            infra/k8s/configmap.yaml
            infra/k8s/pvc.yaml
            infra/k8s/deployments.yaml
          namespace: mycyber-dlp-staging
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

  # ────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions: {}
    steps:
      - name: Wait for rollout
        run: sleep 30
      - name: Health checks
        run: |
          for svc in ingestion:8000 ml-inference:8001 policy-engine:8002 alert:8003 dashboard-api:8080; do
            name=${svc%%:*}
            port=${svc##*:}
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.STAGING_LB_HOST }}:${port}/healthz" || echo "000")
            echo "$name health: $status"
            [ "$status" = "200" ] || (echo "FAIL: $name" && exit 1)
          done

  # ────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production (manual approval)
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production
      # GitHub environment protection rules enforce manual approval here
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        run: |
          sed -i "s/:latest/:${{ github.sha }}/g" infra/k8s/deployments.yaml
      - name: Deploy to production namespace
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            infra/k8s/namespace.yaml
            infra/k8s/configmap.yaml
            infra/k8s/pvc.yaml
            infra/k8s/deployments.yaml
          namespace: mycyber-dlp
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}
