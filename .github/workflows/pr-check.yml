name: PR Quick Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  quick-check:
    name: Quick PR validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools and runtime dependencies
        run: |
          pip install \
            ruff==0.6.9 \
            black==24.8.0 \
            bandit==1.7.10 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-cov==5.0.0 \
            httpx==0.27.2 \
            aiosqlite==0.20.0 \
            fastapi==0.115.0 \
            uvicorn==0.30.6 \
            pydantic==2.9.2 \
            pydantic-settings==2.5.2 \
            python-dotenv==1.0.1 \
            "python-jose[cryptography]==3.4.0" \
            passlib==1.7.4 \
            bcrypt==4.2.0 \
            "sqlalchemy[asyncio]==2.0.35" \
            python-multipart==0.0.22 \
            email-validator==2.2.0 \
            slowapi==0.1.9 \
            prometheus-client==0.21.0

      - name: Ruff lint check
        run: ruff check backend/app backend/tests

      - name: Black format check
        run: black --check backend/app backend/tests

      - name: Bandit security scan
        run: bandit -r backend/app -c backend/.bandit -ll

      - name: Run tests (fast, fail on first error)
        run: pytest tests/ -v --tb=short -x
        working-directory: backend
        env:
          APP_ENV: testing
          JWT_SECRET_KEY: test-ci-secret
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          USE_TRANSFORMER: "false"
          NER_MODEL_NAME: "dslim/bert-base-NER"
