apiVersion: v1
kind: ConfigMap
metadata:
  name: dlp-config
  namespace: mycyber-dlp
data:
  REDIS_URL: "redis://redis:6379/0"
  OTLP_ENDPOINT: "http://otel-collector:4317"
  MODEL_VERSION: "1.0.0"
  CONFIDENCE_BLOCK_THRESHOLD: "0.85"
  CONFIDENCE_WARN_THRESHOLD: "0.60"
  JWT_EXPIRE_MINUTES: "60"
  POSTGRES_DB: "dlp"
  POSTGRES_USER: "dlp"
