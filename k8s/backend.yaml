apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycyber-backend
  namespace: mycyber-dlp
  labels:
    app: mycyber-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mycyber-backend
  template:
    metadata:
      labels:
        app: mycyber-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: ghcr.io/khan-feroz211/mycyber-project/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: "production"
        - name: SECURITY_HEADERS_ENABLED
          value: "true"
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/mycyber_dlp"
        envFrom:
        - secretRef:
            name: mycyber-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: mycyber-backend-service
  namespace: mycyber-dlp
  labels:
    app: mycyber-backend
spec:
  selector:
    app: mycyber-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
