apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mycyber-ingress-prod
  namespace: mycyber-dlp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mycyber.yourdomain.com
    secretName: mycyber-tls-cert
  - hosts:
    - grafana.mycyber.yourdomain.com
    secretName: grafana-tls-cert
  rules:
  - host: mycyber.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: mycyber-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mycyber-frontend-service
            port:
              number: 80
  - host: grafana.mycyber.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
