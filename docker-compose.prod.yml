version: "3.9"

# =============================================================================
# MyCyber DLP — Production Docker Compose
# Usage: make prod-up  OR  docker-compose -f docker-compose.prod.yml up -d
# No volume mounts, 4 uvicorn workers, internal/external network separation.
# =============================================================================

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env.docker
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app
             --host 0.0.0.0 --port 8000
             --workers 4 --no-access-log"
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s

  # ── React / nginx Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
