version: "3.9"

# =============================================================================
# MyCyber DLP — Development Docker Compose
# Usage: make up  OR  docker-compose up -d
# =============================================================================

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mycyber_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-mycyber_dlp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: mycyber_backend
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mycyber_dlp}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Live-reload: mount source into container (dev only)
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app
             --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s

  # ── React / nginx Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: mycyber_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
